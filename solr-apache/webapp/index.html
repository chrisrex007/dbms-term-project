<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="High-performance distributed text search engine powered by Apache Solr and ZooKeeper with real-time full-text search, faceted navigation, and document upload."
    />
    <title>SolrSearch — Distributed Search Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
      <div class="nav-container">
        <a href="index.html" class="nav-brand">
          <svg
            class="nav-logo"
            viewBox="0 0 32 32"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <circle
              cx="14"
              cy="14"
              r="10"
              stroke="currentColor"
              stroke-width="2.5"
            />
            <line
              x1="21.5"
              y1="21.5"
              x2="28"
              y2="28"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
            />
          </svg>
          <span>curlygores</span>
        </a>
        <div class="nav-links">
          <a href="index.html" class="nav-link active">Search</a>
          <a href="benchmark.html" class="nav-link">Benchmarks</a>
        </div>
      </div>
    </nav>

    <!-- Hero Search Section -->
    <section class="hero" id="hero">
      <div class="hero-content">
        <h1 class="hero-title">
          <span class="hero-title-glow">Distributed</span> Search Engine
        </h1>
        <p class="hero-subtitle"></p>

        <div class="search-box" id="search-box">
          <form id="search-form" class="search-form">
            <div class="search-input-wrapper">
              <svg
                class="search-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
              </svg>
              <input
                type="text"
                id="search-input"
                placeholder="Search documents, content, PDFs..."
                autocomplete="off"
                aria-label="Search query"
              />
              <div id="suggestions" class="suggestions-dropdown"></div>
            </div>
            <button type="submit" id="search-button" class="search-btn">
              <span>Search</span>
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <line x1="5" y1="12" x2="19" y2="12" />
                <polyline points="12 5 19 12 12 19" />
              </svg>
            </button>
          </form>
          <div class="search-metrics" id="search-metrics">
            <span class="metric-badge" id="response-time-badge">
              <svg viewBox="0 0 16 16" fill="currentColor">
                <circle cx="8" cy="8" r="4" />
              </svg>
              <span id="response-time">0</span> ms
            </span>
          </div>
        </div>
      </div>
    </section>

    <!-- Results Section -->
    <main class="results-section" id="results-section">
      <div class="results-layout">
        <!-- Sidebar Facets -->
        <aside class="facets-sidebar" id="facets-sidebar">
          <div class="facet-card">
            <h3 class="facet-title">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z" />
              </svg>
              Filter by File
            </h3>
            <div id="category-facets">
              <div class="facet-items"></div>
            </div>
          </div>
          <div class="facet-card">
            <h3 class="facet-title">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"
                />
                <line x1="7" y1="7" x2="7.01" y2="7" />
              </svg>
              Tags
            </h3>
            <div id="tags-facets">
              <div class="facet-items"></div>
            </div>
          </div>
        </aside>

        <!-- Results Content -->
        <div class="results-main">
          <div id="results-stats" class="results-stats"></div>
          <div id="search-results" class="results-list"></div>
          <div id="pagination" class="pagination"></div>
        </div>
      </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.5.141/pdf.min.js"></script>
    <script>
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.5.141/pdf.worker.min.js";
    </script>
    <script src="js/app.js?v=2"></script>
  </body>
</html>
